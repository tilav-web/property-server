# ============================================================================
# Host nginx config - uybos.uz (Uzbekistan deploy)
# ----------------------------------------------------------------------------
# Frontend: uybos.uz, www.uybos.uz
# Backend:  api.uybos.uz
#
# Serverga ko'chirish:
#   sudo cp nginx-uybos.conf /etc/nginx/sites-available/uybos.conf
#   sudo ln -sf /etc/nginx/sites-available/uybos.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d uybos.uz -d www.uybos.uz -d api.uybos.uz
# ============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ============================================================================
# FRONTEND: uybos.uz
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name uybos.uz www.uybos.uz;

    root /var/www/uybos-client;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    access_log /var/log/nginx/uybos-client-access.log;
    error_log /var/log/nginx/uybos-client-error.log warn;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(json|ico|png|jpg|jpeg|webp|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# ============================================================================
# BACKEND: api.uybos.uz
# ============================================================================
upstream uybos_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.uybos.uz;

    client_max_body_size 100M;
    client_body_timeout 120s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript;

    access_log /var/log/nginx/uybos-api-access.log;
    error_log /var/log/nginx/uybos-api-error.log warn;

    # Socket.IO - WebSocket upgrade
    location /socket.io/ {
        proxy_pass http://uybos_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Static uploads (nginx orqali, NestJS dan tezroq)
    location /uploads/ {
        alias /home/property/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location /api/docs {
        proxy_pass http://uybos_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /payme/webhook {
        proxy_pass http://uybos_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass http://uybos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
