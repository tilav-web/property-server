# ============================================================================
# Host nginx config - Amaar Properties (frontend + backend + Socket.IO)
# ----------------------------------------------------------------------------
# Serverga ko'chirish:
#   sudo cp nginx-amaar.conf /etc/nginx/sites-available/amaar.conf
#   sudo ln -sf /etc/nginx/sites-available/amaar.conf /etc/nginx/sites-enabled/
#   sudo nginx -t                                     # sintaksis tekshirish
#   sudo systemctl reload nginx
#
# Domen va sertifikat:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d amaar.uz -d www.amaar.uz -d api.amaar.uz
#   (Certbot HTTPS server bloklarini avtomatik qo'shadi, HTTP -> HTTPS redirect)
#
# DNS A yozuvlari:
#   amaar.uz       -> server IP
#   www.amaar.uz   -> server IP
#   api.amaar.uz   -> server IP
#
# Folder strukturasi (host serverda):
#   /var/www/amaar-client/         <- vite build natija (dist/* nusxasi)
#   /opt/property/server/uploads/  <- docker-compose volume (bind mount)
# ============================================================================

# ----------------------------------------------------------------------------
# WebSocket upgrade map (Socket.IO uchun MAJBURIY)
# ----------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ============================================================================
# FRONTEND: amaar.uz (React SPA - statik fayllar)
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name amaar.uz www.amaar.uz;

    root /var/www/amaar-client;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Logging
    access_log /var/log/nginx/amaar-client-access.log;
    error_log /var/log/nginx/amaar-client-error.log warn;

    # Vite hash bilan nomlangan assetlar - uzoq cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Rasm, ikonka, font - qisqa cache
    location ~* \.(json|ico|png|jpg|jpeg|webp|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA history fallback (React Router) - barcha route'lar index.html'ga
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html - cache yo'q (har deploy'da yangilanadi)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# ============================================================================
# BACKEND: api.amaar.uz (NestJS + Socket.IO)
# ============================================================================

upstream amaar_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.amaar.uz;

    # Yuklash hajmi (rasm/video uchun)
    client_max_body_size 100M;
    client_body_timeout 120s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript;

    # Logging
    access_log /var/log/nginx/amaar-api-access.log;
    error_log /var/log/nginx/amaar-api-error.log warn;

    # ------------------------------------------------------------------------
    # Socket.IO - WebSocket upgrade (MAJBURIY)
    # ------------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://amaar_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket - uzoq connection timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # ------------------------------------------------------------------------
    # Static uploads - nginx orqali (NestJS dan tezroq)
    # docker-compose volume bind: ./uploads -> /opt/property/server/uploads
    # ------------------------------------------------------------------------
    location /uploads/ {
        alias /opt/property/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------------
    # Swagger UI (production'da IP whitelist qo'shing)
    # ------------------------------------------------------------------------
    location /api/docs {
        # allow 1.2.3.4;  # office IP
        # deny all;
        proxy_pass http://amaar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------------
    # Payme webhook - keng timeout
    # ------------------------------------------------------------------------
    location /payme/webhook {
        proxy_pass http://amaar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ------------------------------------------------------------------------
    # Asosiy API
    # ------------------------------------------------------------------------
    location / {
        proxy_pass http://amaar_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ============================================================================
# Certbot tomonidan avtomatik qo'shiladi (sudo certbot --nginx):
#   - server { listen 443 ssl http2; ... } bloklari
#   - HTTP (80) -> HTTPS (443) redirect
#   - ssl_certificate va ssl_certificate_key
# ============================================================================
