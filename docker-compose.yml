# ============================================================================
# Production docker-compose - NestJS backend + MongoDB + nginx reverse proxy
# ----------------------------------------------------------------------------
# Foydalanish:
#   1. .env faylini to'ldiring (.env.example asosida)
#   2. docker compose up -d --build
#   3. nginx 80 portda eshitadi (HTTPS uchun Certbot host'da sozlang)
#
# Volumes:
#   - mongo_data: MongoDB persistent storage
#   - uploads: foydalanuvchi yuklagan fayllar (rasm/video)
#
# Eslatma:
#   - Frontend alohida deploy qilinadi (client/Dockerfile)
#     yoki shu yerga `web` xizmati qo'shish mumkin
# ============================================================================

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Container ichida server 3000 portda eshitadi
      PORT: 3000
      # MongoDB connection (container nomi orqali)
      MONGODB_URL: mongodb://mongo:27017/property
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads:/usr/src/app/uploads
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mongo:
    image: mongo:7
    container_name: property-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: property-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # HTTPS uchun (Certbot bilan):
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/var/www/uploads:ro
      # SSL sertifikatlari uchun:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - server
    networks:
      - app-net

volumes:
  mongo_data:
  uploads:
  nginx_logs:

networks:
  app-net:
    driver: bridge
