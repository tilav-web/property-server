# ============================================================================
# Production docker-compose - NestJS backend + MongoDB
# ----------------------------------------------------------------------------
# Foydalanish:
#   1. .env faylini to'ldiring (.env.example asosida)
#   2. docker compose up -d --build
#   3. Server localhost:3000 portda eshitadi
#   4. Host nginx (sites-available/amaar.conf) /api va /socket.io ni
#      shu konteynerga proxy qiladi. Nginx config: docs/nginx-amaar.conf
#
# Volumes:
#   - mongo_data: MongoDB persistent storage
#   - uploads:    foydalanuvchi yuklagan fayllar (rasm/video)
#                 host nginx ham shu volume'ga ulanadi (bind mount orqali)
#
# Frontend: alohida (Vercel/Netlify) yoki host'da static build
#   /var/www/amaar-client/ ga (host nginx serve qiladi)
# ============================================================================

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      MONGODB_URL: mongodb://mongo:27017/property
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      # Faqat localhost'ga ochiladi (host nginx ko'rsin, tashqaridan emas)
      - "127.0.0.1:3000:3000"
    volumes:
      # Uploads host'ga ham bind qilinadi - nginx tez serve qilsin
      - ./uploads:/usr/src/app/uploads
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mongo:
    # Default mongo 7 - AVX CPU talab qiladi.
    # Eski VPS (AVX yo'q) uchun .env ga: MONGO_VERSION=4.4
    image: mongo:${MONGO_VERSION:-7}
    container_name: property-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-net
    healthcheck:
      # mongosh (mongo 5+) yoki mongo (4.4) - shellini moslashtiradi
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping:1})' 2>/dev/null || mongo --quiet --eval 'db.adminCommand({ping:1})'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  mongo_data:

networks:
  app-net:
    driver: bridge
