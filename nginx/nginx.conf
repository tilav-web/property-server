# ============================================================================
# Production nginx config - NestJS backend + Socket.IO + static uploads
# ----------------------------------------------------------------------------
# Bu fayl docker-compose ichida `nginx` xizmati uchun ishlatiladi.
# Real production server'da Certbot bilan SSL qo'shing (pastdagi izohga qarang).
# ============================================================================

upstream api_backend {
    server server:3000;
    keepalive 64;
}

# WebSocket upgrade map (Socket.IO uchun MAJBURIY)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Yuklash hajmi (rasm/video uchun)
    client_max_body_size 100M;
    client_body_timeout 120s;

    # Gzip - kichik javoblar tezroq keladi
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        image/svg+xml;

    # Logging
    access_log /var/log/nginx/api-access.log;
    error_log /var/log/nginx/api-error.log warn;

    # ------------------------------------------------------------------------
    # Socket.IO - alohida location (WebSocket upgrade MAJBURIY)
    # ------------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket - uzoq connection timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # ------------------------------------------------------------------------
    # Static uploads - nginx orqali (NestJS dan tezroq)
    # Docker volume: server:/usr/src/app/uploads -> nginx:/var/www/uploads
    # ------------------------------------------------------------------------
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------------
    # Swagger UI (production'da IP whitelist qo'shing)
    # ------------------------------------------------------------------------
    location /api/docs {
        # allow 1.2.3.4;  # office IP
        # deny all;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------------
    # Payme webhook - keng timeout (Payme retry qiladi)
    # ------------------------------------------------------------------------
    location /api/payme/webhook {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ------------------------------------------------------------------------
    # Asosiy API
    # ------------------------------------------------------------------------
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ============================================================================
# HTTPS (production) - Certbot bilan sozlanadi:
#
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d api.amaar.uz
#
# Certbot avtomatik HTTPS server bloki qo'shadi, HTTP -> HTTPS redirect ham.
# ============================================================================
